<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0f0f28"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#f5d061"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6d28d9"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#a78bfa" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/><line x1="900" y1="0" x2="900" y2="400"/>
  </g>

  <!-- Background glow circles -->
  <circle cx="200" cy="200" r="180" fill="#a78bfa" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="800" cy="200" r="160" fill="#f5d061" opacity="0.03" filter="url(#softGlow)"/>

  <!-- === LOGO (left side) === -->
  <g transform="translate(180, 100) scale(0.9)">
    <!-- Outer hexagon -->
    <polygon points="100,18 169,58 169,138 100,178 31,138 31,58"
             fill="none" stroke="url(#purple)" stroke-width="3" opacity="0.6"/>

    <!-- Inner hexagon -->
    <polygon points="100,35 155,68 155,128 100,161 45,128 45,68"
             fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>

    <!-- Owl eyes -->
    <g filter="url(#glow)">
      <circle cx="75" cy="80" r="16" fill="#0f0f23" stroke="url(#gold)" stroke-width="2"/>
      <circle cx="75" cy="80" r="8" fill="url(#gold)" opacity="0.9"/>
      <circle cx="72" cy="77" r="3" fill="#ffffff" opacity="0.5"/>

      <circle cx="125" cy="80" r="16" fill="#0f0f23" stroke="url(#purple)" stroke-width="2"/>
      <circle cx="125" cy="80" r="8" fill="url(#purple)" opacity="0.9"/>
      <circle cx="122" cy="77" r="3" fill="#ffffff" opacity="0.5"/>
    </g>

    <!-- Beak -->
    <polygon points="100,102 92,118 108,118"
             fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.8"/>

    <!-- Brow -->
    <path d="M60,66 Q100,55 140,66" fill="none" stroke="url(#purple)" stroke-width="1.5" opacity="0.4"/>

    <!-- Data nodes -->
    <g filter="url(#glow)">
      <circle cx="100" cy="22" r="3" fill="url(#purple)"/>
      <line x1="100" y1="28" x2="100" y2="48" stroke="url(#purple)" stroke-width="1" opacity="0.4"/>
      <circle cx="100" cy="172" r="3" fill="url(#gold)"/>
      <line x1="100" y1="158" x2="100" y2="148" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
      <circle cx="55" cy="45" r="3" fill="url(#purple)"/>
      <line x1="62" y1="52" x2="70" y2="62" stroke="url(#purple)" stroke-width="1" opacity="0.3"/>
      <circle cx="145" cy="45" r="3" fill="url(#gold)"/>
      <line x1="138" y1="52" x2="130" y2="62" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
      <circle cx="50" cy="145" r="3" fill="url(#gold)"/>
      <line x1="58" y1="138" x2="68" y2="128" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
      <circle cx="150" cy="145" r="3" fill="url(#purple)"/>
      <line x1="142" y1="138" x2="132" y2="128" stroke="url(#purple)" stroke-width="1" opacity="0.3"/>
    </g>
  </g>

  <!-- === TEXT (right side) === -->
  <g transform="translate(440, 0)">
    <!-- KLEOS title -->
    <text x="0" y="170" font-family="'Inter', system-ui, sans-serif" font-size="76" font-weight="700"
          fill="url(#gold)" filter="url(#glow)" letter-spacing="14">KLEOS</text>

    <!-- Subtitle -->
    <text x="0" y="215" font-family="'DM Mono', monospace" font-size="18"
          fill="#a78bfa" opacity="0.8" letter-spacing="8">AI NFT AGENT</text>

    <!-- Tagline -->
    <text x="0" y="255" font-family="'Inter', system-ui, sans-serif" font-size="15"
          fill="#c9a84c" opacity="0.6" font-style="italic">κλέος — glory through the hunt</text>

    <!-- Pill badges -->
    <g transform="translate(0, 280)">
      <rect x="0" y="0" width="80" height="28" rx="14" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.5"/>
      <text x="40" y="19" text-anchor="middle" font-family="'DM Mono', monospace" font-size="11" fill="#c9a84c" opacity="0.8">SWEEP</text>

      <rect x="90" y="0" width="70" height="28" rx="14" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.5"/>
      <text x="125" y="19" text-anchor="middle" font-family="'DM Mono', monospace" font-size="11" fill="#a78bfa" opacity="0.8">SNIPE</text>

      <rect x="170" y="0" width="70" height="28" rx="14" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.5"/>
      <text x="205" y="19" text-anchor="middle" font-family="'DM Mono', monospace" font-size="11" fill="#c9a84c" opacity="0.8">TRACK</text>

      <rect x="250" y="0" width="70" height="28" rx="14" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.5"/>
      <text x="285" y="19" text-anchor="middle" font-family="'DM Mono', monospace" font-size="11" fill="#a78bfa" opacity="0.8">CLAIM</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <line x1="100" y1="370" x2="1100" y2="370" stroke="url(#gold)" stroke-width="1" opacity="0.15"/>

  <!-- Small logo ghost on right -->
  <g transform="translate(1020, 290) scale(0.25)" opacity="0.08">
    <polygon points="100,18 169,58 169,138 100,178 31,138 31,58"
             fill="none" stroke="#a78bfa" stroke-width="3"/>
    <circle cx="75" cy="80" r="16" fill="none" stroke="#f5d061" stroke-width="2"/>
    <circle cx="125" cy="80" r="16" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <polygon points="100,102 92,118 108,118" fill="none" stroke="#f5d061" stroke-width="2"/>
  </g>
</svg>