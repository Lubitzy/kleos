<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#121030"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d061"/>
      <stop offset="100%" style="stop-color:#b8942e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="185" fill="url(#bg)" stroke="url(#purple)" stroke-width="1.5" opacity="0.3"/>

  <!-- Central glow -->
  <circle cx="200" cy="185" r="100" fill="#a78bfa" opacity="0.06" filter="url(#softGlow)"/>

  <!-- === GEOMETRIC OWL FACE === -->

  <!-- Body: Hexagon (AI node) -->
  <polygon points="200,80 270,120 270,260 200,300 130,260 130,120"
           fill="none" stroke="url(#purple)" stroke-width="2.5" opacity="0.35"/>
  <polygon points="200,95 255,127 255,253 200,285 145,253 145,127"
           fill="#121030" fill-opacity="0.3" stroke="url(#gold)" stroke-width="0.8" opacity="0.15"/>

  <!-- Ears/Horns — triangles at top (owl tufts) -->
  <polygon points="172,92 162,55 182,85" fill="#121030" fill-opacity="0.5" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  <polygon points="228,92 238,55 218,85" fill="#121030" fill-opacity="0.5" stroke="url(#purple)" stroke-width="1.5" opacity="0.6"/>

  <!-- Eye sockets — large hexagons -->
  <polygon points="165,145 165,128 185,128 195,142 185,158 165,158"
           fill="#0a0a1a" stroke="url(#gold)" stroke-width="2"/>
  <polygon points="235,145 235,128 215,128 205,142 215,158 235,158"
           fill="#0a0a1a" stroke="url(#purple)" stroke-width="2"/>

  <!-- Eyes — glowing -->
  <g filter="url(#glow)">
    <!-- Left eye — gold -->
    <circle cx="177" cy="143" r="9" fill="url(#gold)" opacity="0.95"/>
    <circle cx="174" cy="140" r="3.5" fill="#ffffff" opacity="0.6"/>
    <!-- Right eye — purple -->
    <circle cx="223" cy="143" r="9" fill="url(#purple)" opacity="0.95"/>
    <circle cx="220" cy="140" r="3.5" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Brow ridge -->
  <path d="M155,125 Q200,112 245,125" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
  <path d="M160,136 Q200,125 240,136" fill="none" stroke="url(#purple)" stroke-width="1" opacity="0.25"/>

  <!-- Beak — downward triangle -->
  <polygon points="200,168 188,192 212,192"
           fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.8"/>
  <line x1="200" y1="168" x2="200" y2="192" stroke="url(#gold)" stroke-width="0.8" opacity="0.4"/>

  <!-- Chest detail — small diamond (NFT symbol) -->
  <g transform="translate(200, 240)">
    <polygon points="0,-14 10,0 0,14 -10,0"
             fill="none" stroke="url(#purple)" stroke-width="1.5" opacity="0.5"/>
    <polygon points="0,-6 5,0 0,6 -5,0"
             fill="url(#gold)" opacity="0.3"/>
  </g>

  <!-- === AI CIRCUIT LINES === -->

  <!-- Left circuit -->
  <g stroke="url(#purple)" stroke-width="1" opacity="0.25" fill="none">
    <line x1="145" y1="143" x2="110" y2="143"/>
    <line x1="110" y1="143" x2="110" y2="180"/>
    <circle cx="110" cy="180" r="2.5" fill="url(#purple)" stroke="none"/>
    <line x1="110" y1="143" x2="110" y2="110"/>
    <circle cx="110" cy="108" r="2.5" fill="url(#purple)" stroke="none"/>
  </g>

  <!-- Right circuit -->
  <g stroke="url(#gold)" stroke-width="1" opacity="0.25" fill="none">
    <line x1="255" y1="143" x2="290" y2="143"/>
    <line x1="290" y1="143" x2="290" y2="180"/>
    <circle cx="290" cy="182" r="2.5" fill="url(#gold)" stroke="none"/>
    <line x1="290" y1="143" x2="290" y2="110"/>
    <circle cx="290" cy="108" r="2.5" fill="url(#gold)" stroke="none"/>
  </g>

  <!-- Top circuit -->
  <g stroke="url(#purple)" stroke-width="1" opacity="0.2" fill="none">
    <line x1="200" y1="80" x2="200" y2="55"/>
    <circle cx="200" cy="52" r="3" fill="url(#gold)" stroke="none"/>
  </g>

  <!-- Bottom circuits -->
  <g stroke="url(#gold)" stroke-width="1" opacity="0.2" fill="none">
    <line x1="200" y1="300" x2="200" y2="325"/>
    <circle cx="200" cy="328" r="2.5" fill="url(#purple)" stroke="none"/>
  </g>

  <!-- Floating data nodes -->
  <g filter="url(#glow)" opacity="0.5">
    <circle cx="80" cy="120" r="1.5" fill="#a78bfa"/>
    <circle cx="320" cy="120" r="1.5" fill="#f5d061"/>
    <circle cx="80" cy="260" r="1.5" fill="#f5d061"/>
    <circle cx="320" cy="260" r="1.5" fill="#a78bfa"/>
    <circle cx="200" cy="45" r="1.5" fill="#f5d061"/>
  </g>

  <!-- Outer ring segments -->
  <g fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.12">
    <path d="M30,200 A170,170 0 0,1 110,45"/>
    <path d="M370,200 A170,170 0 0,1 290,355"/>
  </g>
  <g fill="none" stroke="url(#purple)" stroke-width="0.8" opacity="0.12">
    <path d="M370,200 A170,170 0 0,1 290,45"/>
    <path d="M30,200 A170,170 0 0,1 110,355"/>
  </g>
</svg>